# =====================================================
# Academic Collaboration Platform - Docker Compose Stack
# Production-Ready Configuration
# =====================================================

version: '3.8'

# ============== SERVICES ==============
services:
  # ========== MySQL Database ==========
  mysql:
    image: mysql:8.0
    container_name: swd_mysql
    restart: unless-stopped

    # Resource limits (production best practice)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-academic_collaboration_db}
      MYSQL_USER: ${DB_USER:-appuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-123456}

    ports:
      - "${MYSQL_EXTERNAL_PORT:-3307}:3306"

    volumes:
      - swd_mysql_data:/var/lib/mysql
      - ./database-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

    networks:
      - swd_network

    # Health check for reliable startup
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-123456}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    # MySQL optimization
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=200

    # Metadata labels (for filtering & monitoring)
    labels:
      - "com.docker.compose.project=swd"
      - "com.swd.service=mysql"
      - "com.swd.component=database"
      - "com.swd.version=8.0"
      - "com.swd.environment=${NODE_ENV:-production}"

    # Log rotation (prevent disk fill)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========== Backend API ==========
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: ${NODE_ENV:-production}

    image: swd-backend:latest
    container_name: swd_backend
    restart: unless-stopped

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

    # Wait for MySQL to be healthy
    depends_on:
      mysql:
        condition: service_healthy

    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}

      # Database Configuration
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-academic_collaboration_db}
      DB_USER: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-123456}

      # JWT Authentication
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here}
      JWT_EXPIRE: ${JWT_EXPIRE:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your_jwt_refresh_secret_key}
      JWT_REFRESH_EXPIRE: ${JWT_REFRESH_EXPIRE:-7d}

      # Admin Account
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@gmail.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}

      # CORS Configuration
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}

      # Email Configuration (Optional)
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}

      # OTP Configuration
      OTP_EXPIRE_MINUTES: ${OTP_EXPIRE_MINUTES:-1}

    ports:
      - "${PORT:-3000}:3000"

    volumes:
      - ./uploads:/usr/src/app/uploads

    networks:
      - swd_network

    # Health check endpoint
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

    # Metadata labels
    labels:
      - "com.docker.compose.project=swd"
      - "com.swd.service=backend"
      - "com.swd.component=api"
      - "com.swd.version=1.0.0"
      - "com.swd.environment=${NODE_ENV:-production}"
      - "maintainer=dev-team"

    # Log rotation with compression
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

# ============== NETWORKS ==============
networks:
  swd_network:
    name: swd_network
    driver: bridge

    # Custom subnet for internal communication
    ipam:
      config:
        - subnet: 172.29.0.0/16

    labels:
      - "com.docker.compose.project=swd"
      - "com.swd.network=internal"

# ============== VOLUMES ==============
volumes:
  swd_mysql_data:
    name: swd_mysql_data
    driver: local

    labels:
      - "com.docker.compose.project=swd"
      - "com.swd.volume=database"
      - "com.swd.backup=required"
      - "com.swd.persistent=true"
